use_default_settings: true

general:
  instance_name: "Story Agent Search"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

server:
  secret_key: "story-agent-searxng-local"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false

ui:
  static_use_hash: true

engines:
  - name: google
    disabled: false
  - name: brave
    disabled: false
  - name: duckduckgo
    disabled: false
  - name: wikipedia
    disabled: false
  - name: startpage
    disabled: false

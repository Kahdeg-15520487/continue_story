services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - library-data:/library
      - sqlite-data:/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - LIBRARY_PATH=/library
      - SQLITE_PATH=/data/knowledge-engine.db
      - AGENT_HOST=agent
      - AGENT_PORT=3001
    restart: unless-stopped
    depends_on:
      agent:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    environment:
      - API_PROXY_TARGET=http://api:5000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/static:/app/static
      - ./frontend/svelte.config.js:/app/svelte.config.js
      - ./frontend/vite.config.ts:/app/vite.config.ts
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    volumes:
      - library-data:/library
      - ./skills:/skills:ro
      - ./agent/models.json:/root/.pi/agent/models.json:ro
    environment:
      - PI_CWD=/library
      - PORT=3001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - PI_MODEL=${PI_MODEL:-deepseek/deepseek-v4-flash}
      - MAX_SESSIONS=${MAX_SESSIONS:-10}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  library-data:
  sqlite-data:
